name: iot-is
services:
  emqx:
    image: emqx/emqx:5.8.1
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT
      - "18083:18083" # Dashboard
    volumes:
      - ./emqx/cluster.plain.hocon:/opt/emqx/data/configs/cluster.hocon
      - ./emqx/acl.conf:/opt/emqx/etc/acl.conf
      - ./emqx/init_user.json:/opt/emqx/init_user.json
    networks:
      - int-network
      - out-network

networks:
  int-network:
  out-network:
