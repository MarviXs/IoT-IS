name: reverse-proxy
services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data:/data
      - ./config:/config
      - ../certbot/www:/var/www/certbot
    environment:
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
      - BACKEND_DOMAIN=${BACKEND_DOMAIN}
      - MQTT_DOMAIN=${MQTT_DOMAIN}
    networks:
      - iot-is_out-network
networks:
  iot-is_out-network:
    external: true
